{% extends "base.html" %}

{% block title %}Subir archivos{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-lg p-4">
      <h2 class="text-center mb-4" style="color: #ffc107;">Subir archivos .zpl</h2>

      <form action="/subir" method="post" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="carpeta" class="form-label">Nombre de la carpeta</label>
          <input type="text" name="carpeta" id="carpeta" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="zplfile" class="form-label">Seleccionar archivos .zpl</label>
          <input type="file" name="zplfile[]" id="zplfile" class="form-control" multiple accept=".zpl" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100">Subir</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
