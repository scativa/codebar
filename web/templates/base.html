<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Etiqueta Manager{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #121212;
      color: #f0f0f0;
      padding-top: 70px;
    }
    .card {
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 16px;
    }
    .form-label {
      color: #ffc107;
    }
    .btn-primary {
      background-color: #ffc107;
      border-color: #ffc107;
      color: #000;
    }
    .btn-primary:hover {
      background-color: #e0a800;
      border-color: #e0a800;
    }
    .alert {
      margin-top: 1rem;
    }
    .navbar {
      background-color: #1e1e1e;
    }
    .nav-link {
      color: #f0f0f0 !important;
    }
    .nav-link.active {
      color: #ffc107 !important;
    }
  </style>
</head>
<body>

  <!-- Navbar de navegación -->
  <nav class="navbar navbar-expand-lg fixed-top shadow">
    <div class="container-fluid">
      <a class="navbar-brand text-warning" href="/">Etiqueta Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon text-light"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Imprimir</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/subir' %}active{% endif %}" href="/subir">Subir</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-warning alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
