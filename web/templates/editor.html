<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-light">
<div class="container mt-4">

    <h2>{{ titulo if titulo else "Editor" }}</h2>
    <hr>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-info">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <textarea name="contenido" class="form-control bg-black text-light"
                  style="height: 500px; font-family: monospace;">{{ contenido }}</textarea>

        <button class="btn btn-success mt-3">Guardar</button>
    </form>

    <a href="/" class="btn btn-secondary btn-sm mt-3">Volver</a>

</div>
</body>
</html>
