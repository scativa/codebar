<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Etiquetas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-light">
<div class="container mt-4">

    <h2 class="mb-4">Generador de Etiquetas</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-info">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="row">

            <div class="col-md-4 mb-3">
                <label>ID</label>
                <input name="id" class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Material</label>
                <input name="mat" class="form-control">
            </div>

            <!-- RESPONSABLE (Combo) -->
            <div class="col-md-4 mb-3">
                <label>Responsable</label>
                <select name="resp" class="form-select bg-black text-light">
                    <option value="">-- Seleccionar --</option>
                    {% if datos.responsables %}
                        {% for item in datos.responsables %}
                        <option value="{{ item }}">{{ item }}</option>
                        {% endfor %}
                    {% endif %}
                </select>
            </div>

            <!-- ESTADO (Combo) -->
            <div class="col-md-4 mb-3">
                <label>Estado</label>
                <select name="estado" class="form-select bg-black text-light">
                    <option value="">-- Seleccionar --</option>
                    {% if datos.estados %}
                        {% for est in datos.estados %}
                        <option value="{{ est }}">{{ est }}</option>
                        {% endfor %}
                    {% endif %}
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label>Fecha</label>
                <input type="date" name="fecha" class="form-control">
            </div>

            <!-- IMPRESORAS -->
            <div class="col-md-4 mb-3">
                <label>Impresora</label>
                <select name="impresora" class="form-select bg-black text-light">
                    <option value="">-- Seleccionar impresora --</option>
                    {% for imp in impresoras %}
                        <option value="{{ imp }}">{{ imp }}</option>
                    {% endfor %}
                </select>
            </div>

        </div>

        <button name="vista_previa" class="btn btn-warning">Vista previa</button>
        <button name="imprimir" class="btn btn-primary">Imprimir</button>
    </form>

    <hr>

    <a href="/editor_zpl" class="btn btn-info btn-sm mt-3">Editar ZPL</a>
    <a href="/editor_json" class="btn btn-secondary btn-sm mt-3">Editar JSON</a>

</div>
</body>
</html>
